name: Python Lint and Test

on:
  push:
    paths:
      - 'python/**'
  pull_request:
    paths:
      - 'python/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run ruff check
        run: poetry run ruff check .

      - name: Generate ArangoDB password
        id: arango-pw
        run: echo "password=$(openssl rand -hex 16)" >> "$GITHUB_OUTPUT"

      - name: Run tests
        env:
          ARANGO_DB_PASSWORD: ${{ steps.arango-pw.outputs.password }}
        run: poetry run pytest
