name: Java Build

# Runs Maven tests on Java source changes for fast PR feedback.
# The JAR is no longer stored as a GH Actions artifact — it is compiled
# inside Docker by the java-build stage (Dockerfile) and baked into the
# pipeline image.  See .github/workflows/build-image.yml for the full
# image build and ECR push.

on:
  push:
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Publish Test Report
        uses: ctrf-io/github-test-reporter@v1
        if: always()
        with:
          # Point to the directory or pattern containing your XML files
          report-path: 'target/surefire-reports/*.xml'
          summary-report: true     # Creates the Job Summary dashboard
          pull-request-report: true # Posts a summary comment on the PR
          # This replaces the 'reporter: java-junit' logic
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert"
              }
            }